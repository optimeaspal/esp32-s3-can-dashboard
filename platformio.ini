[platformio]
default_envs = esp32-s3-touch-lcd-7

; ── Ziel-Hardware: Waveshare ESP32-S3-Touch-LCD-7 ──────────────────────────
; Board-spezifika (8 MB QIO-Flash, 8 MB Octal-PSRAM, GT911-Touch, ST7701-RGB)
; werden über sdkconfig.defaults gesetzt, nicht hier.
[env:esp32-s3-touch-lcd-7]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = espidf

monitor_speed = 115200
upload_speed  = 921600

board_build.partitions = default_8MB.csv

; ── Native Unit-Tests (laufen auf dem PC, kein Board erforderlich) ──────────
; Signal-Dekodierung und WidgetBinding-Logik werden hier getestet.
[env:native]
platform       = native
test_framework = unity
