<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="900" height="360" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Automatische Betriebsmodi (beim Boot gewählt)</text>

  <!-- Card 1: USB-NET -->
  <g>
    <rect x="30" y="60" width="260" height="270" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="30" y="60" width="260" height="54" rx="16" fill="#2563eb"/>
    <rect x="30" y="90" width="260" height="24" fill="#2563eb"/>
    <text x="160" y="94" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">USB-NET</text>
    <text x="160" y="150" text-anchor="middle" font-size="16" fill="#475569">USB-Host angeschlossen</text>
    <text x="160" y="172" text-anchor="middle" font-size="15" fill="#94a3b8">Inbetriebnahme am PC</text>
    <text x="55" y="215" font-size="17" fill="#334155">Mux</text><text x="265" y="215" text-anchor="end" font-size="17" font-weight="700" fill="#2563eb">USB</text>
    <text x="55" y="250" font-size="17" fill="#334155">CAN</text><text x="265" y="250" text-anchor="end" font-size="17" font-weight="700" fill="#dc2626">✗ aus</text>
    <text x="55" y="285" font-size="17" fill="#334155">Netz</text><text x="265" y="285" text-anchor="end" font-size="17" font-weight="700" fill="#334155">USB-LAN</text>
  </g>

  <!-- Card 2: WLAN-STA -->
  <g>
    <rect x="320" y="60" width="260" height="270" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="320" y="60" width="260" height="54" rx="16" fill="#059669"/>
    <rect x="320" y="90" width="260" height="24" fill="#059669"/>
    <text x="450" y="94" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">WLAN-STA</text>
    <text x="450" y="150" text-anchor="middle" font-size="16" fill="#475569">kein USB · WLAN hinterlegt</text>
    <text x="450" y="172" text-anchor="middle" font-size="15" fill="#94a3b8">Büro / Labor</text>
    <text x="345" y="215" font-size="17" fill="#334155">Mux</text><text x="555" y="215" text-anchor="end" font-size="17" font-weight="700" fill="#059669">CAN</text>
    <text x="345" y="250" font-size="17" fill="#334155">CAN</text><text x="555" y="250" text-anchor="end" font-size="17" font-weight="700" fill="#16a34a">✓ aktiv</text>
    <text x="345" y="285" font-size="17" fill="#334155">Netz</text><text x="555" y="285" text-anchor="end" font-size="17" font-weight="700" fill="#334155">externes LAN</text>
  </g>

  <!-- Card 3: WLAN-SoftAP -->
  <g>
    <rect x="610" y="60" width="260" height="270" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="610" y="60" width="260" height="54" rx="16" fill="#d97706"/>
    <rect x="610" y="90" width="260" height="24" fill="#d97706"/>
    <text x="740" y="94" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">WLAN-SoftAP</text>
    <text x="740" y="150" text-anchor="middle" font-size="16" fill="#475569">kein USB · kein WLAN</text>
    <text x="740" y="172" text-anchor="middle" font-size="15" fill="#94a3b8">Feld / standalone</text>
    <text x="635" y="215" font-size="17" fill="#334155">Mux</text><text x="845" y="215" text-anchor="end" font-size="17" font-weight="700" fill="#059669">CAN</text>
    <text x="635" y="250" font-size="17" fill="#334155">CAN</text><text x="845" y="250" text-anchor="end" font-size="17" font-weight="700" fill="#16a34a">✓ aktiv</text>
    <text x="635" y="285" font-size="17" fill="#334155">Netz</text><text x="845" y="285" text-anchor="end" font-size="17" font-weight="700" fill="#334155">eigener AP</text>
  </g>
</svg>
