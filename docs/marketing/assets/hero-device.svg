<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="900" height="600" fill="#ffffff"/>
  <!-- Bezel -->
  <rect x="30" y="30" width="840" height="500" rx="30" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
  <!-- Screen -->
  <rect x="60" y="58" width="780" height="444" rx="10" fill="#0b1220"/>

  <!-- top chips: multi-source -->
  <g font-size="18" font-weight="700">
    <rect x="80" y="76" width="70" height="30" rx="15" fill="#1d4ed8"/>
    <text x="115" y="97" fill="#ffffff" text-anchor="middle">CAN</text>
    <rect x="158" y="76" width="86" height="30" rx="15" fill="#059669"/>
    <text x="201" y="97" fill="#ffffff" text-anchor="middle">MQTT</text>
  </g>
  <text x="450" y="98" fill="#94a3b8" text-anchor="middle" font-size="20" font-weight="600">Motor · Seite 1</text>
  <!-- gear icon hint -->
  <circle cx="800" cy="91" r="14" fill="none" stroke="#22c55e" stroke-width="3"/>
  <circle cx="800" cy="91" r="5" fill="#22c55e"/>

  <!-- Gauge (RPM) -->
  <path d="M143.7 286.3 A115 115 0 1 1 306.3 286.3" fill="none" stroke="#1e293b" stroke-width="18" stroke-linecap="round"/>
  <path d="M143.7 286.3 A115 115 0 0 1 251.8 93.2" fill="none" stroke="#3b82f6" stroke-width="18" stroke-linecap="round"/>
  <line x1="225" y1="205" x2="247" y2="113" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round"/>
  <circle cx="225" cy="205" r="10" fill="#e2e8f0"/>
  <text x="225" y="235" fill="#ffffff" text-anchor="middle" font-size="40" font-weight="700">3200</text>
  <text x="225" y="262" fill="#94a3b8" text-anchor="middle" font-size="18">U/min</text>

  <!-- Arc (Fuel) -->
  <path d="M572.8 262.2 A95 95 0 1 1 707.2 262.2" fill="none" stroke="#1e293b" stroke-width="16" stroke-linecap="round"/>
  <path d="M572.8 262.2 A95 95 0 0 1 690.9 114.8" fill="none" stroke="#22c55e" stroke-width="16" stroke-linecap="round"/>
  <text x="640" y="200" fill="#ffffff" text-anchor="middle" font-size="34" font-weight="700">62%</text>
  <text x="640" y="226" fill="#94a3b8" text-anchor="middle" font-size="17">Tank</text>

  <!-- Temp bar (warning) -->
  <text x="130" y="352" fill="#94a3b8" font-size="17">Kühlmittel</text>
  <rect x="130" y="360" width="300" height="28" rx="14" fill="#1e293b"/>
  <rect x="130" y="360" width="234" height="28" rx="14" fill="#f59e0b"/>
  <text x="446" y="382" fill="#f59e0b" text-anchor="start" font-size="20" font-weight="700">92 °C</text>

  <!-- LED status -->
  <circle cx="150" cy="440" r="20" fill="#14532d"/>
  <circle cx="150" cy="440" r="12" fill="#22c55e"/>
  <text x="182" y="447" fill="#e2e8f0" font-size="20" font-weight="600">System OK</text>

  <!-- Input widget (button → publish) -->
  <rect x="600" y="410" width="180" height="60" rx="12" fill="#2563eb"/>
  <text x="690" y="448" fill="#ffffff" text-anchor="middle" font-size="24" font-weight="700">PUMPE</text>
  <text x="690" y="330" fill="#60a5fa" text-anchor="middle" font-size="16" font-weight="600">Bedien-Widget → MQTT</text>

  <!-- page dots -->
  <circle cx="430" cy="480" r="6" fill="#3b82f6"/>
  <circle cx="452" cy="480" r="6" fill="#334155"/>
  <circle cx="474" cy="480" r="6" fill="#334155"/>

  <!-- caption -->
  <text x="450" y="565" fill="#0f172a" text-anchor="middle" font-size="26" font-weight="700">7&quot; Touch · frei konfigurierbar · CAN + MQTT</text>
</svg>
